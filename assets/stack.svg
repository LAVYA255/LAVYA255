<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 712 52" width="712" height="52" role="img" aria-label="Stack: TypeScript, Python, Next.js, FastAPI, Node.js, PostgreSQL, Redis">
  <defs>
    <style>
      .chip { fill: #161b22; stroke: #30363d; }
      .tag  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #c9d1d9; }
    </style>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="chips">
      <rect x="6"   y="10" width="108" height="32" rx="8"/>
      <rect x="124" y="10" width="84"  height="32" rx="8"/>
      <rect x="218" y="10" width="84"  height="32" rx="8"/>
      <rect x="312" y="10" width="90"  height="32" rx="8"/>
      <rect x="412" y="10" width="88"  height="32" rx="8"/>
      <rect x="510" y="10" width="112" height="32" rx="8"/>
      <rect x="632" y="10" width="74"  height="32" rx="8"/>
    </clipPath>
  </defs>

  <!-- chips -->
  <g>
    <rect class="chip" x="6"   y="10" width="108" height="32" rx="8"/>
    <circle cx="22"  cy="26" r="4" fill="#58a6ff"/><text class="tag" x="36"  y="31">TypeScript</text>
    <rect class="chip" x="124" y="10" width="84"  height="32" rx="8"/>
    <circle cx="140" cy="26" r="4" fill="#ffd866"/><text class="tag" x="154" y="31">Python</text>
    <rect class="chip" x="218" y="10" width="84"  height="32" rx="8"/>
    <circle cx="234" cy="26" r="4" fill="#e6edf3"/><text class="tag" x="248" y="31">Next.js</text>
    <rect class="chip" x="312" y="10" width="90"  height="32" rx="8"/>
    <circle cx="328" cy="26" r="4" fill="#7ee787"/><text class="tag" x="342" y="31">FastAPI</text>
    <rect class="chip" x="412" y="10" width="88"  height="32" rx="8"/>
    <circle cx="428" cy="26" r="4" fill="#6cc24a"/><text class="tag" x="442" y="31">Node.js</text>
    <rect class="chip" x="510" y="10" width="112" height="32" rx="8"/>
    <circle cx="526" cy="26" r="4" fill="#58a6ff"/><text class="tag" x="540" y="31">PostgreSQL</text>
    <rect class="chip" x="632" y="10" width="74"  height="32" rx="8"/>
    <circle cx="648" cy="26" r="4" fill="#ff6b6b"/><text class="tag" x="662" y="31">Redis</text>
  </g>

  <!-- soft shine sweeping across the chips only -->
  <g clip-path="url(#chips)">
    <rect y="0" width="150" height="52" fill="url(#shine)">
      <animate attributeName="x" from="-150" to="712" dur="4.5s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
